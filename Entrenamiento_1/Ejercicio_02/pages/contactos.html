<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="../styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a> | <a href="./contactos.html">Contacto</a>
        </nav>
    </header>
    <main>
        <section class="section-contacto">
            <form class="contact-form" action="#" method="post">
                <label for="nombre">Nombre & Apellido</label>
                <input type="text" id="nombre" name="nombre" placeholder="Coloca aqui tu nombre y apellido" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Coloca aqui tu@email.com" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono"
                       pattern="[\+]?[\d\s\-\(\)]{8,}"
                       title="Ingresar telefono válido (+Codigo de país, codigo de area, número de télefono)"
                       placeholder="+54 9 11 555 4444" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>

                <div class="form-actions">
                    <button type="submit">Enviar</button>
                    <button type="reset">Cancelar</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>Todos los derechos reservados© - 2026</p>
    </footer>
</body>
</html>
